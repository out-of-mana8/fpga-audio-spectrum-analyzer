<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bgp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="900" height="200" fill="url(#bgp)" rx="8" stroke="#30363d" stroke-width="1.5"/>

  <!-- Pipeline boxes -->
  <!-- Mic -->
  <rect x="30" y="50" width="120" height="65" rx="8" fill="#1f2937" stroke="#3b82f6" stroke-width="2"/>
  <text x="90" y="80" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="15" font-weight="bold" text-anchor="middle">MIC IN</text>
  <text x="90" y="100" fill="#94a3b8" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" text-anchor="middle">Line-in jack</text>

  <!-- Arrow -->
  <line x1="150" y1="83" x2="190" y2="83" stroke="#58a6ff" stroke-width="2" marker-end="url(#ap)"/>

  <!-- WM8731 -->
  <rect x="195" y="50" width="120" height="65" rx="8" fill="#1f2937" stroke="#3b82f6" stroke-width="2"/>
  <text x="255" y="80" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="15" font-weight="bold" text-anchor="middle">WM8731</text>
  <text x="255" y="100" fill="#94a3b8" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" text-anchor="middle">I2S @ 48 kHz</text>

  <line x1="315" y1="83" x2="355" y2="83" stroke="#58a6ff" stroke-width="2" marker-end="url(#ap)"/>

  <!-- I2S Capture -->
  <rect x="360" y="50" width="130" height="65" rx="8" fill="#1f2937" stroke="#3b82f6" stroke-width="2"/>
  <text x="425" y="80" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="15" font-weight="bold" text-anchor="middle">I2S CAPTURE</text>
  <text x="425" y="100" fill="#94a3b8" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" text-anchor="middle">256 samples</text>

  <line x1="490" y1="83" x2="530" y2="83" stroke="#58a6ff" stroke-width="2" marker-end="url(#ap)"/>

  <!-- FFT -->
  <rect x="535" y="45" width="140" height="75" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="605" y="78" fill="#6ee7b7" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="15" font-weight="bold" text-anchor="middle">256-PT FFT</text>
  <text x="605" y="98" fill="#a7f3d0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" text-anchor="middle">8-stage butterfly</text>

  <!-- Split line -->
  <line x1="675" y1="83" x2="705" y2="83" stroke="#58a6ff" stroke-width="2" />

  <!-- VGA Display -->
  <rect x="730" y="15" width="140" height="65" rx="8" fill="#4c1d95" stroke="#a78bfa" stroke-width="2"/>
  <text x="800" y="45" fill="#f3e8ff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="15" font-weight="bold" text-anchor="middle">VGA 640x480</text>
  <text x="800" y="65" fill="#c4b5fd" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" text-anchor="middle">Bars + waterfall</text>

  <!-- HEX + LED -->
  <rect x="730" y="95" width="140" height="65" rx="8" fill="#7f1d1d" stroke="#fca5a5" stroke-width="2"/>
  <text x="800" y="125" fill="#fee2e2" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="15" font-weight="bold" text-anchor="middle">HEX + LEDs</text>
  <text x="800" y="145" fill="#fecaca" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" text-anchor="middle">Freq + VU meter</text>

  <!-- Fork arrows to VGA and HEX -->
  <path d="M705 83 L710 83 L710 47 L725 47" fill="none" stroke="#58a6ff" stroke-width="2" marker-end="url(#ap)"/>
  <path d="M705 83 L710 83 L710 127 L725 127" fill="none" stroke="#58a6ff" stroke-width="2" marker-end="url(#ap)"/>

  <!-- Clock/config info at bottom -->
  <text x="90" y="150" fill="#9ca3af" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" font-style="italic">I2C Config Initialization</text>
  <path d="M90 156 L90 166 L255 166 L255 115" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4 3"/>

  <text x="450" y="185" fill="#d1d5db" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle">CLOCK_50 (50 MHz)  ──────────────  PLL: 12.288 MHz MCLK  ──────────────  Pixel Clock: 25 MHz (div-2)</text>
</svg>
