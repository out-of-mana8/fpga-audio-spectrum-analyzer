<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06081a"/>
      <stop offset="100%" stop-color="#0a0e24"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1a3a8a"/>
      <stop offset="20%" stop-color="#00aaff"/>
      <stop offset="45%" stop-color="#00ddaa"/>
      <stop offset="70%" stop-color="#ccee00"/>
      <stop offset="100%" stop-color="#ff3322"/>
    </linearGradient>
    <linearGradient id="wfGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000828"/>
      <stop offset="25%" stop-color="#0044aa"/>
      <stop offset="50%" stop-color="#00ccaa"/>
      <stop offset="75%" stop-color="#ddcc00"/>
      <stop offset="100%" stop-color="#ff2200"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="barClip"><rect x="60" y="30" width="780" height="180"/></clipPath>
  </defs>

  <rect width="900" height="320" fill="url(#bg)" rx="8"/>

  <!-- Subtle grid -->
