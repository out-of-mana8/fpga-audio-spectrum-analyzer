  <text x="320" y="355" fill="#1a2838" font-family="monospace" font-size="7" text-anchor="middle">640 x 480 @ 60 Hz  //  25 MHz pixel clock  //  ADV7123 DAC</text>

  <!-- Annotation lines -->
  <!-- Bar area bracket -->
  <line x1="628" y1="15" x2="635" y2="15" stroke="#1a3050" stroke-width="0.5"/>
  <line x1="635" y1="15" x2="635" y2="240" stroke="#1a3050" stroke-width="0.5"/>
