  <text x="632" y="132" fill="#2a4a70" font-family="monospace" font-size="6" text-anchor="end" transform="rotate(-90,632,132)">320 px  bar graph</text>

  <!-- Waterfall bracket -->
  <line x1="628" y1="252" x2="635" y2="252" stroke="#1a3050" stroke-width="0.5"/>
  <line x1="635" y1="252" x2="635" y2="342" stroke="#1a3050" stroke-width="0.5"/>
  <line x1="628" y1="342" x2="635" y2="342" stroke="#1a3050" stroke-width="0.5"/>
